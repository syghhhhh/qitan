<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业背调智能体</title>
    <link rel="stylesheet" href="/static/style.css?v=0.0.3">
</head>
<body>
    <div class="container">
        <header>
            <h1>企业背调智能体</h1>
            <p class="subtitle">输入企业名称，获取企业画像、需求信号、风险提示和沟通话术</p>
        </header>

        <!-- Panel 1: 用户输入 -->
        <section class="panel" id="panel-input">
            <div class="panel-header">
                <h2>查询输入</h2>
            </div>
            <div class="panel-body">
                <div class="form-group">
                    <label for="company-name">企业名称 <span class="required">*</span></label>
                    <input type="text" id="company-name" placeholder="请输入目标企业名称" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="company-website">企业官网</label>
                        <input type="text" id="company-website" placeholder="https://example.com">
                    </div>
                    <div class="form-group">
                        <label for="sales-goal">跟进目标</label>
                        <select id="sales-goal">
                            <option value="first_touch">首次触达</option>
                            <option value="lead_generation">线索挖掘</option>
                            <option value="meeting_prep">会前准备</option>
                            <option value="solution_pitch">方案推进</option>
                            <option value="account_planning">客户经营</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="user-product">我方产品/服务描述</label>
                    <input type="text" id="user-product" placeholder="例如：CRM系统、销售管理工具、数字化解决方案">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="target-role">目标角色</label>
                        <input type="text" id="target-role" placeholder="例如：销售负责人、IT负责人">
                    </div>
                    <div class="form-group">
                        <label for="target-customer">理想客户画像</label>
                        <input type="text" id="target-customer" placeholder="例如：快速成长的中小型企业">
                    </div>
                </div>

                <div class="form-group">
                    <label for="extra-context">补充背景</label>
                    <textarea id="extra-context" rows="3" placeholder="其他需要说明的背景信息..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" id="analyze-btn" class="btn-primary">
                        <span class="btn-text">开始分析</span>
                        <span class="btn-loading" style="display:none;">分析中...</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Panel 2: 企业信息（企查查数据） -->
        <section class="panel" id="panel-enterprise" style="display:none;">
            <div class="panel-header">
                <h2>企业信息</h2>
                <span class="panel-badge" id="enterprise-name-badge"></span>
            </div>
            <div class="panel-body">
                <!-- 基本信息 -->
                <div class="enterprise-section" id="section-basic">
                    <div class="section-header" onclick="toggleSection('section-basic')">
                        <h3>基本信息</h3>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="info-grid" id="grid-basic"></div>
                    </div>
                </div>
                <!-- 资本信息 -->
                <div class="enterprise-section" id="section-capital">
                    <div class="section-header" onclick="toggleSection('section-capital')">
                        <h3>资本信息</h3>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="info-grid" id="grid-capital"></div>
                    </div>
                </div>
                <!-- 注册信息 -->
                <div class="enterprise-section" id="section-registration">
                    <div class="section-header" onclick="toggleSection('section-registration')">
                        <h3>注册信息</h3>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="info-grid" id="grid-registration"></div>
                    </div>
                </div>
                <!-- 地址信息 -->
                <div class="enterprise-section" id="section-address">
                    <div class="section-header" onclick="toggleSection('section-address')">
                        <h3>地址信息</h3>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="info-grid" id="grid-address"></div>
                    </div>
                </div>
                <!-- 行业分类 -->
                <div class="enterprise-section" id="section-industry">
                    <div class="section-header" onclick="toggleSection('section-industry')">
                        <h3>行业分类</h3>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="info-grid" id="grid-industry"></div>
                    </div>
                </div>
                <!-- 经营信息 -->
                <div class="enterprise-section" id="section-operation">
                    <div class="section-header" onclick="toggleSection('section-operation')">
                        <h3>经营信息</h3>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="info-grid" id="grid-operation"></div>
                    </div>
                </div>
                <!-- 联系方式 -->
                <div class="enterprise-section" id="section-contact">
                    <div class="section-header" onclick="toggleSection('section-contact')">
                        <h3>联系方式</h3>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="info-grid" id="grid-contact"></div>
                    </div>
                </div>
                <!-- 银行/开票 -->
                <div class="enterprise-section" id="section-bank">
                    <div class="section-header" onclick="toggleSection('section-bank')">
                        <h3>银行/开票信息</h3>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="info-grid" id="grid-bank"></div>
                    </div>
                </div>
                <!-- 历史/股票 -->
                <div class="enterprise-section" id="section-history">
                    <div class="section-header" onclick="toggleSection('section-history')">
                        <h3>历史/股票信息</h3>
                        <span class="toggle-icon">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="info-grid" id="grid-history"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Panel 3: 大模型分析 -->
        <section class="panel" id="panel-analysis" style="display:none;">
            <div class="panel-header">
                <h2>大模型分析</h2>
                <div class="priority-badge" id="priority-badge"></div>
            </div>
            <div class="panel-body">
                <div class="panel-loading" id="analysis-loading" style="display:none;">
                    <div class="loading-spinner"></div>
                    <span>正在进行 AI 深度分析...</span>
                </div>

                <div id="analysis-content" style="display:none;">
                    <div class="card" id="company-overview">
                        <h3>企业画像</h3>
                        <div class="card-content"></div>
                    </div>
                    <div class="card" id="recent-developments">
                        <h3>近期动态</h3>
                        <div class="card-content"></div>
                    </div>
                    <div class="card" id="demand-signals">
                        <h3>需求信号</h3>
                        <div class="card-content"></div>
                    </div>
                    <div class="card" id="recommended-contacts">
                        <h3>组织洞察</h3>
                        <div class="card-content"></div>
                    </div>
                    <div class="card" id="risk-signals">
                        <h3>风险信号</h3>
                        <div class="card-content"></div>
                    </div>
                    <div class="card" id="sales-assessment">
                        <h3>商务判断</h3>
                        <div class="card-content"></div>
                    </div>
                    <div class="card" id="communication-strategy">
                        <h3>沟通策略</h3>
                        <div class="card-content"></div>
                    </div>
                    <div class="card" id="evidence-references">
                        <h3>证据来源</h3>
                        <div class="card-content"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Panel 4: 智能体问答 -->
        <section class="panel" id="panel-chat" style="display:none;">
            <div class="panel-header">
                <h2>智能体问答</h2>
                <div class="chat-actions-header">
                    <button class="btn-clear" id="clear-chat-btn" title="清空对话">清空</button>
                </div>
            </div>
            <div class="panel-body chat-panel-body">
                <div class="chat-messages" id="chat-messages">
                    <div class="message assistant">
                        <div class="message-content">你好！我已经了解了这家企业的背景信息。你可以问我任何关于该企业的问题，比如合作切入点、风险点、决策链分析等。</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <textarea id="chat-input" rows="2" placeholder="输入你的问题..."></textarea>
                    <div class="chat-buttons">
                        <button class="btn-send" id="send-btn">发送</button>
                        <button class="btn-stop" id="stop-btn" style="display:none;">停止</button>
                    </div>
                </div>
            </div>
        </section>

        <div class="error-message" id="error-message" style="display:none;"></div>
    </div>

    <script src="/static/app.js?v=0.0.3"></script>
</body>
</html>
